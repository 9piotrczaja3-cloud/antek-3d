<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antek Company - Druki 3D</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f2f2f2;
}

/* HERO */
.hero {
    background: url('https://images.unsplash.com/photo-1564349683136-77e08dba1ef7') center/cover no-repeat;
    color: white;
    text-align: center;
    padding: 80px 20px;
}

.hero h1 {
    font-size: 28px;
    margin-bottom: 10px;
}

.hero p {
    font-size: 16px;
}

/* CONTENT */
.container {
    padding: 20px;
}

/* PRODUCTS */
.products {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
}

.product {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.product img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.product-content {
    padding: 15px;
}

.product h3 {
    margin: 0 0 5px;
}

.price {
    color: #28a745;
    font-size: 18px;
    margin: 5px 0;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    background: #007BFF;
    color: white;
    border-radius: 8px;
    font-size: 15px;
}

/* CONTACT */
.contact {
    text-align: center;
    margin-top: 30px;
}

.phone-btn {
    display: block;
    margin: 10px auto;
    padding: 15px;
    background: #28a745;
    color: white;
    border-radius: 10px;
    text-decoration: none;
    width: 80%;
}

/* FLOATING WHATSAPP */
.whatsapp-float {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 15px 18px;
    border-radius: 50px;
    font-size: 18px;
    text-decoration: none;
    box-shadow: 0 5px 10px rgba(0,0,0,0.3);
}

/* FOOTER */
footer {
    text-align: center;
    padding: 15px;
    font-size: 13px;
    color: gray;
}
</style>

</head>
<body>

<div class="hero">
    <h1>Antek Company – Druki 3D</h1>
    <p>Nowoczesne wydruki • Szybka realizacja</p>
</div>

<div class="container">

<h2>Nasze produkty</h2>

<div class="products">

<div class="product">
    <img src=resized_1.jpg>
    <div class="product-content">
        <h3>Figurka 3D</h3>
        <p class="price">50 zł</p>
        <button onclick="location.href='tel:+48884311707'">Kup teraz</button>
    </div>
</div>

<div class="product">
    <img src="zdjecie2.png">
    <div class="product-content">
        <h3>Uchwyt na telefon</h3>
        <p class="price">30 zł</p>
        <button onclick="location.href='tel:+48884311707'">Kup teraz</button>
    </div>
</div>

</div>

<div class="contact">
    <h2>Kontakt</h2>
    <a href="tel:+48884311707" class="phone-btn">📞 Zadzwoń: +48 884 311 707</a>
</div>

</div>

<a href="https://wa.me/48884311707" class="whatsapp-float">💬</a>

<footer>
© 2026 Antek Company
</footer>

</body>
</html>
